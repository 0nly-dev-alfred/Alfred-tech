<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Course Registration | Alfred Tech</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
 <style>
    * { 
        margin: 0;
        padding: 0; 
        box-sizing: border-box; 
        font-family: 'Segoe UI', sans-serif;
    }

    body { 
        background-color: #0f172a;
        color: #f8fafc;
        display: flex;
        flex-direction: column;
        align-items: center; 
        min-height: 100vh; 
        padding: 20px; 
        padding-top: 100px; 
    }

    .navbar { 
        position: fixed; 
        top: 0;
        left: 0; 
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center; 
        padding: 20px 10%;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(10px);
        z-index: 1000; 
        border-bottom: 1px solid #334155; 
    }

    .nav-logo a { 
        font-size: 1.5rem;
        font-weight: bold;
        color: white; 
        text-decoration: none;
        letter-spacing: 1px; 
        white-space: nowrap; /* Prevents logo from breaking into two lines */
    }

    .nav-logo span { color: #ff00ff; }

    .nav-links { 
        list-style: none; 
        display: flex; 
        gap: 25px;
        align-items: center;
    }

    .nav-links a { 
        text-decoration: none; 
        color: #cbd5e1; 
        font-size: 0.95rem; 
        font-weight: 500; 
        transition: color 0.3s;
        white-space: nowrap;
    }

    .nav-links a:hover { color: #ff00ff; }

    /* Container & Form Styles */
    .container { max-width: 500px; width: 100%; text-align: center; }
    header h1 { 
        font-size: 2.5rem; 
        margin-bottom: 10px;
        background: linear-gradient(90deg, #ff00ff, #00d2ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    header p { margin-bottom: 30px; color: #94a3b8; }
    .registration-box { 
        background: #1e293b;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        text-align: left;
        transition: opacity 0.3s ease;
    }
    .input-group { margin-bottom: 15px; }
    .input-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #cbd5e1; }
    .input-group input, .input-group select {
        width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #334155;
        background: #0f172a; color: white; outline: none;
    }

    .btn-submit, .nav-cta {
        background: #ff00ff; color: white !important; border: none; 
        border-radius: 6px; font-weight: bold; cursor: pointer;
        text-decoration: none; display: inline-block; 
        animation: colorCycle 3s infinite ease-in-out;
    }
    .btn-submit { width: 100%; padding: 14px; font-size: 1rem; margin-top: 10px; }
    .nav-cta { padding: 8px 15px; }

    @keyframes colorCycle { 
        0%, 100% { background-color: #ff00ff; box-shadow: 0 0 5px #ff00ff; }
        50% { background-color: #7000ff; box-shadow: 0 0 20px #7000ff; }
    }

    /* MOBILE RESPONSIVE TWEAKS */
    @media (max-width: 768px) {
        .navbar {
            padding: 15px 5%; /* Reduces side spacing on mobile */
        }
        .nav-logo a {
            font-size: 1rem; /* Smaller logo for mobile */
        }
        .nav-links {
            gap: 12px; /* Tighter gap between menu items */
        }
        .nav-links a {
            font-size: 0.8rem;
        }
        .nav-cta {
            padding: 6px 10px;
            font-size: 0.75rem;
        }
        header h1 {
            font-size: 1.8rem; /* Shrinks header so it fits screen width */
        }
    }
</style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">
            <a href="index.html">ALFRED TECH<span>ACADEMY</span></a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="courses.html">Courses</a></li>
            <li><a href="index.html">About</a></li>
            <li><a href="index.html" class="nav-cta">Register</a></li>
        </ul>
    </nav>

    <div class="container">
        <header>
            <h1>Level Up Your Tech Skills</h1>
            <p>Join our comprehensive technical and leadership boot camps.</p>
        </header>

        <section class="registration-box">
            <h2>Course Registration</h2>
            <form id="regForm">
                <div class="input-group">
                    <label for="full-name">Full Name</label>
                    <input type="text" id="full-name" placeholder="John Doe" required>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="email@example.com" required>
                </div>

                <div class="input-group">
                    <label for="course">Select Track</label>
                    <select id="course">
                        <option value="Front-End Engineering">Front-End Engineering</option>
                        <option value="Back-End Architecture">Back-End Architecture</option>
                        <option value="UI/UX Design Strategy">UI/UX Design Strategy</option>
                        <option value="Project Management">Project Management</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit">Secure My Spot</button>
                <p class="form-disclaimer">
                    Securing a spot grants 48-hour priority access. <br>
                    Limited to 50 applicants per track.
                </p>
            </form>
        </section>
    </div>

    <script>
        // 1. INITIALIZE (Enter your Public Key from EmailJS Account Settings)
        (function() {
            emailjs.init("ogzWuNiymzaYa_-Es"); 
        })();

        document.getElementById('regForm').addEventListener('submit', function(event) {
            event.preventDefault();

            // 2. DATA CAPTURE
            const nameInput = document.getElementById('full-name');
            const emailInput = document.getElementById('email');
            const courseDropdown = document.getElementById('course');
            const registrationBox = document.querySelector('.registration-box');

            const nameValue = nameInput.value.trim();
            const emailValue = emailInput.value.trim();
            const courseTrack = courseDropdown.options[courseDropdown.selectedIndex].text;
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            // 3. VALIDATION
            let isValid = true;
            if (nameValue.split(' ').length < 2) {
                alert("Please enter your full first and last name.");
                isValid = false;
            }
            if (!emailPattern.test(emailValue)) {
                alert("Please provide a valid email address.");
                isValid = false;
            }

            if (!isValid) return;

            // 4. TRIGGER EMAIL (Use your IDs from EmailJS Dashboard)
            emailjs.send("service_xpgoy1a", "template_vzoj55a", {
                user_name: nameValue,
                user_email: emailValue,
                course_track: courseTrack
            }).then(
                (res) => console.log("Success"),
                (err) => alert("Failed to send: " + JSON.stringify(err))
            );

            // 5. CELEBRATION & UI TRANSITION
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff00ff', '#00d2ff', '#ffffff']
            });

            registrationBox.style.opacity = '0';
            
            setTimeout(() => {
                registrationBox.innerHTML = `
                    <div class="success-message">
                        <div class="success-icon">🔑</div>
                        <h2 style="color: #ff00ff; margin-bottom: 15px; font-size: 2rem;">Priority Access Granted</h2>
                        <p style="color: #f8fafc; font-size: 1.1rem; margin-bottom: 15px; font-weight: 600;">Congratulations, ${nameValue}.</p>
                        <p style="color: #94a3b8; line-height: 1.6; margin-bottom: 15px;">Your spot for <strong>${courseTrack}</strong> is locked. Check <strong>${emailValue}</strong> for your invitation link.</p>
                        <button onclick="window.location.reload()" class="btn-submit">Close</button>
                    </div>
                `;
                registrationBox.style.opacity = '1';
            }, 300);
        });
    </script>
</body>
</html>
